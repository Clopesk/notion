<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Meteorologia Lisboa</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #121212;
      overflow: hidden; /* remove scroll */
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .weatherwidget-io {
      width: 100vw;   /* largura total do ecrã */
      height: 100vh;  /* altura total do ecrã */
    }
  </style>
</head>
<body>

  <a class="weatherwidget-io"
     href="https://forecast7.com/pt/38d72n9d14/lisbon/"
     data-label_1="LISBOA"
     data-label_2="METEOROLOGIA"
     data-theme="dark"
     data-mode="Current"
     data-days="3">
     LISBOA METEOROLOGIA
  </a>

  <script>
  !function(d,s,id){
    var js,fjs=d.getElementsByTagName(s)[0];
    if(!d.getElementById(id)){
      js=d.createElement(s);
      js.id=id;
      js.src='https://weatherwidget.io/js/widget.min.js';
      fjs.parentNode.insertBefore(js,fjs);
    }
  }(document,'script','weatherwidget-io-js');
  </script>

</body>
</html>
