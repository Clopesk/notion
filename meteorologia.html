<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">

<style>
  body {
    margin: 0;
    background: linear-gradient(180deg, #1c1c1e, #2c2c2e);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
  }

  .card {
    padding: 20px;
    max-width: 420px;
    margin: auto;
  }

  .city {
    font-size: 18px;
    opacity: 0.7;
  }

  .temp {
    font-size: 64px;
    font-weight: 300;
    margin: 10px 0;
  }

  .details {
    display: flex;
    gap: 15px;
    font-size: 14px;
    opacity: 0.85;
  }

  .forecast {
    margin-top: 25px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .day {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    font-size: 15px;
  }

  .day span:first-child {
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="card">
  <div class="city">Lisboa</div>
  <div class="temp" id="temp">--°</div>

  <div class="details">
    <div>💨 <span id="wind">--</span> km/h</div>
    <div>💧 <span id="humidity">--</span>%</div>
  </div>

  <div class="forecast" id="forecast"></div>
</div>

<script>
fetch("https://api.open-meteo.com/v1/forecast?latitude=38.72&longitude=-9.14&current_weather=true&hourly=relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min&timezone=auto")
  .then(res => res.json())
  .then(data => {

    // Temperatura e vento
    document.getElementById("temp").textContent =
      Math.round(data.current_weather.temperature) + "°";

    document.getElementById("wind").textContent =
      data.current_weather.windspeed;

    // 🔥 HUMIDADE (corrigido com hora mais próxima)
    const times = data.hourly.time;
    const now = new Date(data.current_weather.time).getTime();

    let closestIndex = 0;
    let minDiff = Infinity;

    times.forEach((t, i) => {
      const diff = Math.abs(new Date(t).getTime() - now);
      if (diff < minDiff) {
        minDiff = diff;
        closestIndex = i;
      }
    });

    document.getElementById("humidity").textContent =
      data.hourly.relative_humidity_2m[closestIndex];

    // Previsão
    const forecastDiv = document.getElementById("forecast");

    data.daily.time.slice(0, 5).forEach((day, i) => {
      const el = document.createElement("div");
      el.className = "day";

      const date = new Date(day).toLocaleDateString("pt-PT", {
        weekday: "short"
      });

      el.innerHTML = `
        <span>${date}</span>
        <span>${Math.round(data.daily.temperature_2m_min[i])}°  ${Math.round(data.daily.temperature_2m_max[i])}°</span>
      `;

      forecastDiv.appendChild(el);
    });

  });
</script>

</body>
</html>
