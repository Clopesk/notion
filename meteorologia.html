<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
    transition: background 0.5s;
  }

  body.day {
    background: linear-gradient(180deg, #4facfe, #00f2fe);
  }

  body.night {
    background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
  }

  .card {
    padding: 20px;
    max-width: 420px;
    margin: auto;
  }

  .city {
    font-size: 18px;
    opacity: 0.8;
  }

  .temp {
    font-size: 64px;
    font-weight: 300;
    margin: 10px 0;
  }

  .details {
    display: flex;
    gap: 15px;
    font-size: 14px;
    opacity: 0.9;
  }

  .forecast {
    margin-top: 25px;
    border-top: 1px solid rgba(255,255,255,0.2);
  }

  .day {
    display: grid;
    grid-template-columns: 1fr 40px 90px;
    align-items: center;
    padding: 10px 0;
    font-size: 15px;
  }

  .name {
    opacity: 0.8;
  }

  .icon {
    width: 40px;
    text-align: center;
    font-size: 20px;
  }

  .sunday .name {
    color: #ff453a;
    font-weight: 500;
  }
</style>
</head>

<body>

<div class="card">
  <div class="city">Lisboa</div>
  <div class="temp" id="temp">--°</div>

  <div class="details">
    <div>💨 <span id="wind">--</span> km/h</div>
    <div>💧 <span id="humidity">--</span>%</div>
  </div>

  <div class="forecast" id="forecast"></div>
</div>

<script>
/* 🌤️ SVG ICONS (consistentes, tipo iOS) */
function getIcon(code) {
  const icons = {
    sun: "☀️",
    cloud: "☁️",
    rain: "🌧️",
    storm: "⛈️",
    snow: "❄️",
    fog: "🌫️",
    partly: "🌤️"
  };

  if (code === 0) return icons.sun;
  if ([1,2].includes(code)) return icons.partly;
  if (code === 3) return icons.cloud;
  if ([45,48].includes(code)) return icons.fog;
  if ([51,53,55,61,63,65].includes(code)) return icons.rain;
  if ([71,73,75].includes(code)) return icons.snow;
  if ([95,96,99].includes(code)) return icons.storm;
  return "🌡️";
}

fetch("https://api.open-meteo.com/v1/forecast?latitude=38.72&longitude=-9.14&current_weather=true&hourly=relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto")
  .then(res => res.json())
  .then(data => {

    /* 🌙 dia/noite automático */
    const hour = new Date().getHours();
    const isDay = hour >= 7 && hour < 20;
    document.body.className = isDay ? "day" : "night";

    /* temperatura */
    document.getElementById("temp").textContent =
      Math.round(data.current_weather.temperature) + "°";

    document.getElementById("wind").textContent =
      data.current_weather.windspeed;

    /* 💧 humidade correta */
    const times = data.hourly.time;
    const now = new Date(data.current_weather.time).getTime();

    let closest = 0;
    let diffMin = Infinity;

    times.forEach((t, i) => {
      const diff = Math.abs(new Date(t).getTime() - now);
      if (diff < diffMin) {
        diffMin = diff;
        closest = i;
      }
    });

    document.getElementById("humidity").textContent =
      data.hourly.relative_humidity_2m[closest];

    /* 📅 previsão */
    const forecast = document.getElementById("forecast");

    data.daily.time.slice(0, 5).forEach((day, i) => {
      const d = new Date(day);

      const weekday = d.toLocaleDateString("pt-PT", {
        weekday: "short"
      });

      const isSunday = d.getDay() === 0;

      const el = document.createElement("div");
      el.className = "day" + (isSunday ? " sunday" : "");

      el.innerHTML = `
        <span class="name">${weekday}</span>
        <span class="icon">${getIcon(data.daily.weathercode[i])}</span>
        <span>${Math.round(data.daily.temperature_2m_min[i])}° ${Math.round(data.daily.temperature_2m_max[i])}°</span>
      `;

      forecast.appendChild(el);
    });

  });
</script>

</body>
</html>
