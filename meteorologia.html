<html lang="pt">

  /* altura fixa funciona melhor no Notion */
  .wrapper {
    height: 650px; /* AJUSTA ESTE VALOR */
    width: 100%;
    background: #121212;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .weatherwidget-io {
    width: 100%;
  }
</style>
</head>

<div class="wrapper">
  <a class="weatherwidget-io"

     data-theme="dark">
     LISBOA METEOROLOGIA
  </a>
</div>

<script>
!function(d,s,id){
  var js,fjs=d.getElementsByTagName(s)[0];
  if(!d.getElementById(id)){
    js=d.createElement(s);

    js.src='https://weatherwidget.io/js/widget.min.js';
    fjs.parentNode.insertBefore(js,fjs);
  }
}(document,'script','weatherwidget-io-js');
