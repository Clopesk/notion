<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">

<style>
  body {
    margin: 0;
    background: #121212;
    font-family: system-ui;
    color: white;
  }

  .card {
    background: #1e1e1e;
    padding: 20px;
    border-radius: 16px;
    max-width: 420px;
    margin: auto;
  }

  .temp {
    font-size: 48px;
    font-weight: bold;
  }

  .details {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
  }

  .forecast {
    margin-top: 20px;
  }

  .day {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-top: 1px solid #333;
  }
</style>
</head>

<body>

<div class="card">
  <div>Lisboa</div>
  <div class="temp" id="temp">--°</div>

  <div class="details">
    <div>Vento: <span id="wind">--</span> km/h</div>
    <div>Humidade: <span id="humidity">--</span>%</div>
  </div>

  <div class="forecast" id="forecast"></div>
</div>

<script>
fetch("https://api.open-meteo.com/v1/forecast?latitude=38.72&longitude=-9.14&current_weather=true&hourly=relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min&timezone=auto")
  .then(res => res.json())
  .then(data => {

    // Temperatura e vento
    document.getElementById("temp").textContent =
      Math.round(data.current_weather.temperature) + "°";

    document.getElementById("wind").textContent =
      data.current_weather.windspeed;

    // Humidade (usar índice da hora atual)
    const nowIndex = data.hourly.time.indexOf(data.current_weather.time);
    document.getElementById("humidity").textContent =
      data.hourly.relative_humidity_2m[nowIndex];

    // Previsão
    const forecastDiv = document.getElementById("forecast");

    data.daily.time.slice(0, 5).forEach((day, i) => {
      const el = document.createElement("div");
      el.className = "day";

      const date = new Date(day).toLocaleDateString("pt-PT", {
        weekday: "short"
      });

      el.innerHTML = `
        <span>${date}</span>
        <span>${Math.round(data.daily.temperature_2m_min[i])}° / ${Math.round(data.daily.temperature_2m_max[i])}°</span>
      `;

      forecastDiv.appendChild(el);
    });

  });
</script>

</body>
</html>
